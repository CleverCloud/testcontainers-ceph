name: Publish package to the Maven Central Repository
on:
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          if ! [[ "$tag" =~ ^[0-9]{8}(\.[0-9]+)?$ ]]; then
            echo "::error::release tag '$tag' must be YYYYMMDD or YYYYMMDD.N"
            exit 1
          fi
      - name: Install gpg secret key
        run: |
          cat <(echo -e "${{ secrets.CENTRAL_GPG_SECRET_KEY }}") | gpg --batch --import
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          cache: "maven"
      - name: Set pom version from release tag
        run: mvn -B versions:set -DnewVersion=${{ github.event.release.tag_name }} -DgenerateBackupPoms=false
      - name: Publish package
        run: mvn --batch-mode -Dgpg.passphrase=${{ secrets.CENTRAL_GPG_SECRET_KEY_PASSWORD }} deploy -Pdeploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
